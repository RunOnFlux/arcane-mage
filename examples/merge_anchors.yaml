---
# 3 node set up using Merge Anchors. Mix of Static and DHCP, all UPnP

# Info on Merge anchors: https://yaml.org/type/merge.html

# We use the global key to house our Anchors
global:
  hypervisor: &hypervisor
    node: pve1
    storage_images: local-lvm
    storage_iso: local
    storage_import: local
    network: vmbr2
    iso_name: FluxLive-1775071308.iso
    start_on_creation: true
  address_config: &address_config
    gateway: 192.168.1.1
    dns:
      - 8.8.8.8
      - 1.1.1.1
  fluxnode_network: &fluxnode_network
    router_address: 192.168.1.1
    private_chain_sources:
    - 192.168.1.20:16197
    - 192.168.1.21:16187
  system: &system
    ssh_pubkey: ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA operator@fluxnode
    keyboard:
      layout: us
      variant: ""
  installer: &installer
    auto_reboot: true
  fluxnode: &fluxnode
    notifications:
      discord:
        user_id: '123456789012345678'
        webhook_url: https://discord.com/api/webhooks/000000000000000000/xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
  metrics_app_settings: &metrics_app_settings
      poweroff_screen: 0
      theme: gruvbox
  identity: &fluxnode_identity
    flux_id: 1ExampleFluxAddressxxxxxxxxxxxxxxxxxx
    identity_key: L1ExampleIdentityKeyxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
    output_id: 0
# We then use our Anchors to substitute values in our nodes, so we don't repeat ourselves
nodes:
  - hypervisor:
      <<: *hypervisor
      disk_limit: 180
      cpu_limit: 0.8
      network_limit: 18
      vm_name: node1
      node_tier: cumulus
    installer:
      <<: *installer
    network:
      ip_allocation: static
      address_config:
        address: 192.168.1.12/24
        <<: *address_config
    system:
      hostname: node1
      <<: *system
    metrics_app: *metrics_app_settings
    fluxnode:
      <<: *fluxnode
      network:
        <<: *fluxnode_network
        router_address: 192.168.1.1
        upnp_port: 16167
      identity:
        <<: *fluxnode_identity
        tx_id: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
  - hypervisor:
      <<: *hypervisor
      vm_name: node2
      node_tier: nimbus
    installer:
      <<: *installer
    network:
      ip_allocation: static
      address_config:
        address: 192.168.1.13/24
        <<: *address_config
    system:
      hostname: node2
      <<: *system
    metrics_app: *metrics_app_settings
    fluxnode:
      <<: *fluxnode
      network:
        <<: *fluxnode_network
        upnp_enabled: true
        upnp_port: 16177
      identity:
        <<: *fluxnode_identity
        tx_id: bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb
  - hypervisor:
      <<: *hypervisor
      vm_name: node3
      node_tier: stratus
    installer:
      <<: *installer
    network:
      ip_allocation: dynamic
    system:
      hostname: node3
      <<: *system
    fluxnode:
      <<: *fluxnode
      network:
        <<: *fluxnode_network
        upnp_enabled: true
        upnp_port: 16187
      identity:
        <<: *fluxnode_identity
        tx_id: cccccccccccccccccccccccccccccccccccccccccccccccccccccccccccccccc
        # global keys are overrideable
        output_id: 2
