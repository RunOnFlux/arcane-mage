---
# Static IP, Autoboot, Autostart, UPnP, Discord notifications
nodes:
  - hypervisor:
      node: pve1
      storage_images: local-lvm
      storage_iso: local
      storage_import: local
      start_on_creation: true
      network: vmbr0
      iso_name: FluxLive-1775071308.iso
      vm_name: mynode
      node_tier: cumulus
    system:
      hostname: mynode
      ssh_pubkey: ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA operator@fluxnode # optional
    network:
      ip_allocation: static
      address_config:
        address: 192.168.1.10/24
        gateway: 192.168.1.1
        dns:
          - 8.8.8.8
          - 1.1.1.1
    fluxnode:
      identity:
        flux_id: 1ExampleFluxAddressxxxxxxxxxxxxxxxxxx
        identity_key: L1ExampleIdentityKeyxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
        output_id: 0
        tx_id: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      network:
        upnp_port: 16167
        router_address: 192.168.1.1
      notifications:
          discord:
            user_id: '123456789012345678'
            webhook_url: https://discord.com/api/webhooks/000000000000000000/xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
